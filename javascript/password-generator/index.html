<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>

    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <p id="heading-text-1">Generate a</p>
        <p id="heading-text-2">random password</p>
        <p id="txt">Never use an insecure password again.</p>
      </div>
      <div>
        <h4>Enter Password Length:</h4>
        <span class="pwd-text">Password Length:</span>
        <input id="pwd-length" type="number" value="" placeholder="e.g 5" />
      </div>
      <div>
        <button class="btn" onclick="changePassword()">
          Generate passwords
        </button>
        <div id="error-msg"></div>
      </div>
      <hr id="hr" />
      <div class="pwd">
        <input type="text" id="pwd1" class="pwd-btn" value="ab" />
        <input type="text" id="pwd2" class="pwd-btn" value="" />
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
