<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Unit Converter</title>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <p class="heading-txt">Metric/Imperial Unit Conversion</p>
        <input type="number" class="num-box" />
        <button class="btn-hero">Convert</button>
      </div>
      <div class="units-wrapper">
        <div class="units">
          <p class="unit-heading-txt">Length (Meter/Feet)</p>
          <p class="unit-sub-heading-txt">
            20 meters = 65.616 feet | 20 feet = 6.096 meters
          </p>
        </div>
        <div class="units">
          <p class="unit-heading-txt">Volume (Liters/Gallons)</p>
          <p class="unit-sub-heading-txt">
            20 liters = 5.284 gallons | 20 gallons = 75.708 litres
          </p>
        </div>
        <div class="units">
          <p class="unit-heading-txt">Length (Kilograms/Pounds)</p>
          <p class="unit-sub-heading-txt">
            20 kilos = 44.092 pounds | 20 pounds = 9.072 kilos
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
