<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Unit Converter</title>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <p class="heading-txt">Metric/Imperial Unit Conversion</p>
        <input type="number" id="input-box" class="num-box" placeholder="20" />
        <button id="convert-btn" class="btn-hero" value="">Convert</button>
      </div>
      <div class="units-wrapper">
        <div class="units">
          <p class="unit-heading-txt">Length (Meter/Feet)</p>
          <p class="unit-sub-heading-txt">
            <span id="value-in-meters">
              20 meters = 65.620 feet | 20 feet = 6.096 meters
            </span>
          </p>
        </div>
        <div class="units">
          <p class="unit-heading-txt">Volume (Liters/Gallons)</p>
          <p class="unit-sub-heading-txt">
            <span id="value-in-gallons">
              20 liters = 5.284 gallons | 20 gallons = 75.708 litres
            </span>
          </p>
        </div>
        <div class="units">
          <p class="unit-heading-txt">Length (Kilograms/Pounds)</p>
          <p class="unit-sub-heading-txt">
            <span id="value-in-kilos">
              20 kilos = 44.092 pounds | 20 pounds = 9.072 kilos
            </span>
          </p>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
