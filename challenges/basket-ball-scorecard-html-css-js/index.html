<html>
  <head>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="container">
      <div>
        <h2 class="heading-text">HOME</h2>

        <div id="score-home-id" class="score">0</div>

        <div>
          <button class="btn" onclick="incrementByOneHome()">+1</button>
          <button class="btn" onclick="incrementByTwoHome()">+2</button>
          <button class="btn" onclick="incrementByThreeHome()">+3</button>
        </div>
      </div>

      <div>
        <h2 class="heading-text">GUEST</h2>

        <div id="score-guest-id" class="score">0</div>
        <div>
          <button class="btn" onclick="incrementByOneGuest()">+1</button>
          <button class="btn" onclick="incrementByTwoGuest()">+2</button>
          <button class="btn" onclick="incrementByThreeGuest()">+3</button>
        </div>
      </div>
    </div>
    <footer class="footer-text">

          >Sagar Kudu</a
        >
      </p>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
