<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Orbitron:wght@400..900&family=Playwrite+GB+S+Guides:ital@0;1&family=Science+Gothic:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
    <title>Personal Hometown</title>
  </head>
  <body>
    <div id="bg-image">
      <div
        role="img"
        aria-label="my first college which is located at palghar"
      ></div>
      <h2 class="heading-text-1">Visit Our College</h2>
      <h2 class="heading-text-2">
        Enjoy culture and sports in this vibrant district close to the center of
        Palghar.
      </h2>
    </div>

    <div class="feature">
      <h2 id="feature-heading">Top three activities at our College</h2>

      <div class="feature-items">
        <div>
          <img src="images/concert.jpg" />
          <h4>Attend a show or a concert</h4>
        </div>

        <div>
          <img src="images/games.jpg" />
          <h4>Play a games</h4>
        </div>

        <div>
          <img src="images/social.webp" />
          <h4>Social Engagement</h4>
        </div>
      </div>
    </div>

    <div class="profile-card">
      <div>
        <img
          class="profile-card-img"
          src="https://png.pngtree.com/png-vector/20231019/ourmid/pngtree-user-profile-avatar-png-image_10211469.png"
          alt="profile photo of hacker"
        />
      </div>
      <div class="profile-info">
        <h2>Your Guide</h2>
        <p>
          "I am a Full Stack AI Engineer, I enjoy my work as a Frontend Developer..."
        </p>
        <h2>Sagar Kudu</h2>
      </div>
    </div>
  </body>
</html>
